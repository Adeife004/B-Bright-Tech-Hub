<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Google Font -->
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Poppins:wght@600;700&display=swap"
      rel="stylesheet"
    />

    <title>contact</title>
    <!-- fav-icon -->
    <link rel="icon" type="image/webp" href="asset/logo.webp" />

    <!-- Font Awesome 6 (free CDN) -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
      integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <!-- Main stylesheet -->
    <link rel="stylesheet" href="./styles/index.css" />
  </head>
  <body>
    <!-- header -->
    <header class="site-header">
      <nav class="navbar" role="navigation" aria-label="Main Navigation">
        <!-- logo -->
        <div class="navbar__logo">
          <a href="#" aria-label="Home">
            <img src="asset/logo.webp" alt="B Bright Tech Hub Logo" />
          </a>
        </div>

        <!-- hamburger (mobile) -->
        <button
          class="navbar__hamburger"
          id="hamburger"
          aria-label="Toggle menu"
          aria-expanded="false"
          aria-controls="nav-menu"
        >
          <span class="bar"></span>
          <span class="bar"></span>
          <span class="bar"></span>
        </button>

        <!-- navigation links -->
        <ul class="navbar__links" id="nav-menu">
          <li><a href="#" class="navbar__link">Home</a></li>
          <li><a href="#" class="navbar__link">About</a></li>
          <li><a href="#" class="navbar__link">Services</a></li>
          <li><a href="#" class="navbar__link">Contact</a></li>

          <!-- Pages dropdown -->
          <li class="navbar__dropdown" id="pages-dropdown">
            <button
              class="navbar__link navbar__dropdown-toggle"
              aria-haspopup="true"
              aria-expanded="false"
            >
              Pages
              <svg
                class="navbar__chevron"
                width="14"
                height="14"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2.5"
                stroke-linecap="round"
                stroke-linejoin="round"
                aria-hidden="true"
              >
                <polyline points="6 9 12 15 18 9"></polyline>
              </svg>
            </button>
            <ul class="navbar__dropdown-menu" role="menu">
              <li role="none">
                <a href="#" class="navbar__dropdown-item" role="menuitem">
                  <i class="fa-regular fa-star" aria-hidden="true"></i>
                  Testimonials
                </a>
              </li>
              <li role="none">
                <a href="#" class="navbar__dropdown-item" role="menuitem">
                  <i class="fa-solid fa-graduation-cap" aria-hidden="true"></i>
                  Programmes
                </a>
              </li>
            </ul>
          </li>
        </ul>
      </nav>
    </header>

    <!-- Hero section -->
    <main class="contact-hero">
      <!-- Hero Text -->
      <div>
        <h1>GET IN TOUCH</h1>
        <p>We're here to help you build, grow, and innovate.
            Reach out to Bbright Tech Hub and let's create something impactful together
        </p>
      <section class="hero-button">
        <!-- Apply btn -->
       <a href="#">
        <div class="hero-btn"></div>
       </a>
 <!-- Contact btn -->
       <a href="#">
        <div class="hero-btn"></div>
       </a>
      </section>
    </div>

      <!-- Hero Image -->
      <div></div>
    </main>

    <!-- AOS init + main script -->
    <script
      src="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.js"
      integrity="sha512-A7AYk1fGKX6S2SsHywmPkrnzTZHrgiVT7GcQkLGDe2ev0afc/yuadhlzz0nK6YRC/MVaLFZVZosyIQ/gYt5phA=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    ></script>
    <script>
      AOS.init({ once: true, offset: 60 });
    </script>
    <script src="/scripts/index.js"></script>
  </body>
</html>
